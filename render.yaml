services:
  - type: web
    name: gst-it-portal
    runtime: python
    region: singapore
    pythonVersion: "3.11.9"
    buildCommand: >-
      apt-get update &&
      apt-get install -y chromium-browser chromium-chromedriver --no-install-recommends &&
      pip install --upgrade pip setuptools wheel &&
      pip install -r requirements.txt
    startCommand: >-
      gunicorn app:app
      --bind 0.0.0.0:$PORT
      --workers 2
      --threads 4
      --timeout 300
      --worker-class gthread
    envVars:
      - key: RENDER
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: CHROME_BIN
        value: /usr/bin/chromium-browser
      - key: CHROMEDRIVER_PATH
        value: /usr/bin/chromedriver
    plan: standard
    healthCheckPath: /
